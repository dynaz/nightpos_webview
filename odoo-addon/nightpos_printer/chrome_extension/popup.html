<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightPOS Local Printer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <img src="icons/icon48.png" alt="NightPOS" width="28" height="28">
    <div class="header-text">
      <span class="title">NightPOS Local Printer</span>
      <span class="subtitle" id="version-label">v1.0.0</span>
    </div>
  </header>

  <!-- Server status -->
  <section class="card" id="status-card">
    <div class="status-row">
      <span class="dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Checking server…</span>
      <button class="icon-btn" id="refresh-btn" title="Re-check server">↻</button>
    </div>
    <div class="status-detail" id="status-detail"></div>
  </section>

  <!-- Stats -->
  <section class="card">
    <div class="card-title">Print stats</div>
    <div class="stats-grid">
      <div class="stat">
        <span class="stat-val" id="stat-success">—</span>
        <span class="stat-lbl">Success</span>
      </div>
      <div class="stat">
        <span class="stat-val error" id="stat-error">—</span>
        <span class="stat-lbl">Errors</span>
      </div>
      <div class="stat wide">
        <span class="stat-val small" id="stat-printer">—</span>
        <span class="stat-lbl">Last printer</span>
      </div>
    </div>
    <div class="last-time" id="last-time"></div>
    <button class="link-btn" id="reset-btn">Reset stats</button>
  </section>

  <!-- Settings -->
  <section class="card">
    <div class="card-title">Server URL</div>
    <div class="input-row">
      <input type="text" id="ws-url" placeholder="ws://localhost:8765" spellcheck="false">
      <button class="primary-btn" id="save-btn">Save</button>
    </div>
    <div class="save-msg" id="save-msg"></div>
  </section>

  <!-- Printers -->
  <section class="card" id="printers-card">
    <div class="card-title-row">
      <div class="card-title">Available printers</div>
      <button class="icon-btn" id="list-printers-btn" title="Refresh printer list">↻</button>
    </div>
    <ul class="printer-list" id="printer-list">
      <li class="muted">Connect to server to list printers.</li>
    </ul>
  </section>

  <!-- Footer -->
  <footer>
    <span id="last-error-text"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
