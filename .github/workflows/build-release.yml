name: Build APK and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Compute APK name
        id: apk
        run: |
          VERSION=$(grep 'versionName\s*=' app/build.gradle.kts \
            | grep -v 'Suffix' | grep -o '"[^"]*"' | tr -d '"' | head -1)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "name=nightpos-${VERSION}-debug-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ steps.apk.outputs.name }}.apk"

      - name: Build release AAB (for Play Store upload)
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        # Actions artifact storage is a separate quota from release assets below;
        # don't let it block the release step when that quota is exhausted.
        continue-on-error: true
        with:
          name: ${{ steps.apk.outputs.name }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: nightpos-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
