name: Build APK and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Bump patch version
        if: github.event_name == 'workflow_dispatch'
        run: |
          CURRENT_NAME=$(grep 'versionName\s*=' app/build.gradle.kts \
            | grep -v 'Suffix' | grep -o '"[^"]*"' | tr -d '"' | head -1)
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)

          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_CODE=$((CURRENT_CODE + 1))

          sed -i "s/versionCode = ${CURRENT_CODE}/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "Bump version to ${NEW_NAME} (versionCode ${NEW_CODE})"
          git push origin HEAD:${{ github.ref_name }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Compute APK name
        id: apk
        run: |
          VERSION=$(grep 'versionName\s*=' app/build.gradle.kts \
            | grep -v 'Suffix' | grep -o '"[^"]*"' | tr -d '"' | head -1)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "name=nightpos-${VERSION}-debug-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ steps.apk.outputs.name }}.apk"

      - name: Build release AAB (for Play Store upload)
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        # Actions artifact storage is a separate quota from release assets below;
        # don't let it block the release step when that quota is exhausted.
        continue-on-error: true
        with:
          name: ${{ steps.apk.outputs.name }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: nightpos-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Compute release tag
        id: reltag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep 'versionName\s*=' app/build.gradle.kts \
              | grep -v 'Suffix' | grep -o '"[^"]*"' | tr -d '"' | head -1)
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=build-${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        # Release assets use a separate storage pool from Actions artifacts above,
        # so this is also how we hand off builds when the artifact quota is exhausted.
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.reltag.outputs.tag }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
