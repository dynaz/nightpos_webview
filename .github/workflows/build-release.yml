name: Build APK and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      description:
        description: 'Build description (added to APK / artifact name)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full depth so git push of version-bump commit works cleanly
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Bump version
        id: version
        run: |
          # Read current versionName and versionCode from build.gradle.kts
          CURRENT=$(grep 'versionName\s*=' app/build.gradle.kts \
            | grep -v 'Suffix' | grep -o '"[^"]*"' | tr -d '"' | head -1)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          CURRENT_CODE=$(grep 'versionCode\s*=' app/build.gradle.kts \
            | grep -o '[0-9]*' | head -1)
          NEW_CODE=$((CURRENT_CODE + 1))

          # Write new values back into build.gradle.kts
          sed -i "s/versionCode = ${CURRENT_CODE}/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          sed -i "s/versionName = \"${CURRENT}\"/versionName = \"${NEW_VERSION}\"/" app/build.gradle.kts

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "code=${NEW_CODE}"       >> "$GITHUB_OUTPUT"
          echo "Bumped: ${CURRENT} (versionCode ${CURRENT_CODE}) → ${NEW_VERSION} (versionCode ${NEW_CODE})"

      - name: Commit and push version bump
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.code }}) [skip ci]"
          git push

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Compute APK name
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DESC="${{ inputs.description }}"
          # Sanitise description for use in a filename
          SAFE_DESC=$(echo "$DESC" | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' | tr -cd 'a-z0-9._-' | cut -c1-40)
          if [ -n "$SAFE_DESC" ]; then
            APKNAME="nightpos-Ds2_Plus-andriod-11.0.0-${VERSION}-${SHORT_SHA}-${SAFE_DESC}"
          else
            APKNAME="nightpos-Ds2_Plus-andriod-11.0.0-${VERSION}-${SHORT_SHA}"
          fi
          echo "name=${APKNAME}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/${{ steps.apk.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ${{ steps.apk.outputs.name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Compute release tag
        id: reltag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ steps.version.outputs.version }}"
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=build-${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.reltag.outputs.tag }}
          name: "${{ steps.apk.outputs.name }}"
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
