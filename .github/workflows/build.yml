name: Build NightPOS APK

run-name: ${{ inputs.run_name || format('Build {0} APK', inputs.flavor) }}

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: 'Run name (optional, e.g. "fix ABI for D2s Plus")'
        required: false
        default: ''
      flavor:
        description: 'Flavor — pick by: adb shell getprop ro.product.cpu.abi'
        required: true
        default: 'arm32'
        type: choice
        options:
          - arm32
          - arm64
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build arm32 APK (armeabi-v7a — T1, T2, D2s Plus)
        if: ${{ inputs.flavor == 'arm32' || inputs.flavor == 'both' }}
        run: ./gradlew assembleArm32Release --no-daemon

      - name: Build arm64 APK (arm64-v8a — D2s original)
        if: ${{ inputs.flavor == 'arm64' || inputs.flavor == 'both' }}
        run: ./gradlew assembleArm64Release --no-daemon

      - name: Upload arm32 APK
        if: ${{ inputs.flavor == 'arm32' || inputs.flavor == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-arm32
          path: app/build/outputs/apk/arm32/release/*.apk
          retention-days: 30

      - name: Upload arm64 APK
        if: ${{ inputs.flavor == 'arm64' || inputs.flavor == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-arm64
          path: app/build/outputs/apk/arm64/release/*.apk
          retention-days: 30
