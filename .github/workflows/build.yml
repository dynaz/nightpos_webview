name: Build NightPOS APK

run-name: ${{ inputs.run_name || format('Build {0} APK', inputs.flavor) }}

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: 'Run name (optional, e.g. "fix D2s Plus crash")'
        required: false
        default: ''
      flavor:
        description: |
          Device flavor:
            arm32   → Sunmi T1, T2 (armeabi-v7a, GeckoView)
            d2splus → Sunmi D2s Plus (armeabi-v7a, system WebView, Rockchip RK30)
            arm64   → Sunmi D2s original (arm64-v8a, GeckoView)
        required: true
        default: 'd2splus'
        type: choice
        options:
          - arm32
          - d2splus
          - arm64
          - all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build arm32 APK (T1, T2 — armeabi-v7a + GeckoView)
        if: ${{ inputs.flavor == 'arm32' || inputs.flavor == 'all' }}
        run: ./gradlew assembleArm32Release --no-daemon

      - name: Build d2splus APK (D2s Plus — armeabi-v7a + system WebView)
        if: ${{ inputs.flavor == 'd2splus' || inputs.flavor == 'all' }}
        run: ./gradlew assembleD2splusRelease --no-daemon

      - name: Build arm64 APK (D2s original — arm64-v8a + GeckoView)
        if: ${{ inputs.flavor == 'arm64' || inputs.flavor == 'all' }}
        run: ./gradlew assembleArm64Release --no-daemon

      - name: Upload arm32 APK
        if: ${{ inputs.flavor == 'arm32' || inputs.flavor == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-arm32
          path: app/build/outputs/apk/arm32/release/*.apk
          retention-days: 30

      - name: Upload d2splus APK
        if: ${{ inputs.flavor == 'd2splus' || inputs.flavor == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-d2splus
          path: app/build/outputs/apk/d2splus/release/*.apk
          retention-days: 30

      - name: Upload arm64 APK
        if: ${{ inputs.flavor == 'arm64' || inputs.flavor == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-arm64
          path: app/build/outputs/apk/arm64/release/*.apk
          retention-days: 30
