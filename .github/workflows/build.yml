name: Build APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor to build'
        required: true
        default: 'legacy'
        type: choice
        options:
          - legacy
          - modern
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android/setup-android@v3
        with:
          ndk-version: ''

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build legacy APK
        if: ${{ inputs.flavor == 'legacy' || inputs.flavor == 'both' }}
        run: ./gradlew assembleLegacyRelease --no-daemon

      - name: Build modern APK
        if: ${{ inputs.flavor == 'modern' || inputs.flavor == 'both' }}
        run: ./gradlew assembleModernRelease --no-daemon

      - name: Upload legacy APK
        if: ${{ inputs.flavor == 'legacy' || inputs.flavor == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-legacy
          path: app/build/outputs/apk/legacy/release/*.apk
          retention-days: 30

      - name: Upload modern APK
        if: ${{ inputs.flavor == 'modern' || inputs.flavor == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: nightpos-modern
          path: app/build/outputs/apk/modern/release/*.apk
          retention-days: 30
